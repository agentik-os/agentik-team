services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentik
      POSTGRES_PASSWORD: agentik
      POSTGRES_DB: agentik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentik -d agentik"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://agentik:agentik@db:5432/agentik
      PORT: "3100"
      SERVE_UI: "true"
      AGENTIK_DEPLOYMENT_MODE: "authenticated"
      AGENTIK_DEPLOYMENT_EXPOSURE: "private"
      AGENTIK_PUBLIC_URL: "${AGENTIK_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - agentik-data:/agentik-team
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  agentik-data:
