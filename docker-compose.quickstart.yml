services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${AGENTIK_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      AGENTIK_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AGENTIK_DEPLOYMENT_MODE: "authenticated"
      AGENTIK_DEPLOYMENT_EXPOSURE: "private"
      AGENTIK_PUBLIC_URL: "${AGENTIK_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${AGENTIK_DATA_DIR:-./data/docker-paperclip}:/paperclip"
